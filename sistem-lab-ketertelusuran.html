<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lab Energi Terbarukan POLIBAN — Ketertelusuran Sampel (SITRAS)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Serif:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#f3efe6; --paper2:#faf7f0; --card:#fffdf8; --ink:#1b201b; --ink2:#454b43; --muted:#7c8175;
  --line:#ddd6c6; --line2:#e9e3d6;
  --moss:#2e5d3e; --moss-d:#22472f; --moss-l:#dcebdf;
  --amber:#bb7a2f; --amber-l:#f3e6cd; --amber-d:#8a5a1f;
  --terra:#a8432e; --terra-l:#f1ddd6;
  --slate:#3a5170; --slate-l:#dde3ee;
  --shadow:0 1px 2px rgba(30,40,25,.06), 0 8px 24px rgba(30,40,25,.06);
  --radius:10px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:"IBM Plex Sans",system-ui,sans-serif; color:var(--ink);
  background:
    radial-gradient(1200px 600px at 110% -10%, rgba(187,122,47,.07), transparent 60%),
    radial-gradient(1000px 500px at -10% 110%, rgba(46,93,62,.08), transparent 55%),
    var(--paper);
  background-attachment:fixed;
  font-size:14.5px; line-height:1.5; -webkit-font-smoothing:antialiased;
}
.mono{font-family:"IBM Plex Mono",ui-monospace,monospace}
.serif{font-family:"IBM Plex Serif",Georgia,serif}
.micro{font-family:"IBM Plex Mono",monospace; font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted)}
a{color:var(--moss)}

/* ---------- Header ---------- */
header.top{
  position:sticky; top:0; z-index:40;
  background:linear-gradient(180deg, rgba(250,247,240,.96), rgba(243,239,230,.92));
  backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);
}
.top-inner{max-width:1200px; margin:0 auto; padding:14px 20px; display:flex; align-items:center; gap:16px; flex-wrap:wrap}
.brand{display:flex; align-items:center; gap:13px}
.logo{
  width:42px; height:42px; border-radius:11px; flex:0 0 auto;
  background:linear-gradient(145deg,var(--moss),var(--moss-d));
  display:grid; place-items:center; color:#f3efe6; box-shadow:var(--shadow); position:relative; overflow:hidden;
}
.logo svg{width:26px; height:26px}
.brand h1{font-family:"IBM Plex Serif",serif; font-size:19px; margin:0; letter-spacing:-.01em}
.brand .sub{font-size:11px; color:var(--muted); margin-top:1px}
.spacer{flex:1}
.search-wrap{position:relative}
.search-wrap input{
  font-family:"IBM Plex Mono",monospace; font-size:12.5px; width:230px; max-width:46vw;
  padding:9px 12px 9px 32px; border:1px solid var(--line); border-radius:8px; background:var(--card); color:var(--ink);
}
.search-wrap input:focus{outline:none; border-color:var(--moss); box-shadow:0 0 0 3px var(--moss-l)}
.search-wrap svg{position:absolute; left:10px; top:9px; width:15px; height:15px; color:var(--muted)}
.btn{
  font-family:"IBM Plex Sans",sans-serif; font-size:13px; font-weight:600; cursor:pointer;
  padding:9px 14px; border-radius:8px; border:1px solid var(--line); background:var(--card); color:var(--ink);
  display:inline-flex; align-items:center; gap:7px; transition:.12s; white-space:nowrap;
}
.btn:hover{border-color:var(--moss); color:var(--moss)}
.btn svg{width:15px; height:15px}
.btn.pri{background:linear-gradient(145deg,var(--moss),var(--moss-d)); color:#f6f3ec; border-color:var(--moss-d)}
.btn.pri:hover{filter:brightness(1.07); color:#fff}
.btn.amber{background:linear-gradient(145deg,var(--amber),var(--amber-d)); color:#fdf6ea; border-color:var(--amber-d)}
.btn.amber:hover{filter:brightness(1.06); color:#fff}
.btn.ghost{background:transparent}
.btn.danger{color:var(--terra); border-color:var(--terra-l)}
.btn.danger:hover{background:var(--terra-l); border-color:var(--terra)}
.btn.sm{padding:6px 10px; font-size:12px}
.btn:disabled{opacity:.45; cursor:not-allowed}

/* ---------- Nav ---------- */
nav.tabs{max-width:1200px; margin:0 auto; padding:0 12px; display:flex; gap:2px; overflow-x:auto}
nav.tabs button{
  font-family:"IBM Plex Sans",sans-serif; font-size:13px; font-weight:600; cursor:pointer;
  padding:11px 14px; border:none; background:transparent; color:var(--ink2); border-bottom:2.5px solid transparent;
  display:inline-flex; align-items:center; gap:7px; white-space:nowrap; transition:.12s;
}
nav.tabs button:hover{color:var(--moss)}
nav.tabs button.active{color:var(--moss); border-bottom-color:var(--moss)}
nav.tabs button svg{width:15px; height:15px}
nav.tabs button .cnt{font-family:"IBM Plex Mono",monospace; font-size:10px; background:var(--line2); color:var(--ink2); padding:1px 6px; border-radius:20px}
nav.tabs button.active .cnt{background:var(--moss-l); color:var(--moss-d)}

/* ---------- Layout ---------- */
main{max-width:1200px; margin:0 auto; padding:24px 20px 80px}
.view-head{display:flex; align-items:flex-end; justify-content:space-between; gap:16px; flex-wrap:wrap; margin-bottom:20px}
.view-head h2{font-family:"IBM Plex Serif",serif; font-size:24px; margin:0 0 3px; letter-spacing:-.015em}
.view-head p{margin:0; color:var(--muted); font-size:13px; max-width:62ch}
.row{display:flex; gap:14px; flex-wrap:wrap}
.col{flex:1; min-width:0}

/* ---------- Cards ---------- */
.card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow)}
.card.pad{padding:18px}
.card-h{padding:14px 18px; border-bottom:1px solid var(--line2); display:flex; align-items:center; justify-content:space-between; gap:12px}
.card-h h3{margin:0; font-family:"IBM Plex Serif",serif; font-size:16px}
.card-b{padding:18px}

/* stat tiles */
.stats{display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:14px; margin-bottom:22px}
.stat{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:16px; position:relative; overflow:hidden}
.stat::before{content:""; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--moss)}
.stat.amber::before{background:var(--amber)} .stat.slate::before{background:var(--slate)} .stat.terra::before{background:var(--terra)}
.stat .n{font-family:"IBM Plex Mono",monospace; font-size:30px; font-weight:600; line-height:1; margin:6px 0 4px}
.stat .lbl{font-size:12px; color:var(--ink2); font-weight:600}

/* status pill */
.pill{display:inline-flex; align-items:center; gap:6px; font-family:"IBM Plex Mono",monospace; font-size:10.5px; font-weight:600; padding:3px 9px; border-radius:30px; letter-spacing:.02em; white-space:nowrap}
.pill .dot{width:6px; height:6px; border-radius:50%}

/* table */
.tbl-wrap{overflow-x:auto; border:1px solid var(--line); border-radius:var(--radius); background:var(--card)}
table.data{width:100%; border-collapse:collapse; font-size:13px}
table.data th{font-family:"IBM Plex Mono",monospace; font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); text-align:left; padding:11px 14px; border-bottom:1.5px solid var(--line); background:var(--paper2); position:sticky; top:0}
table.data td{padding:11px 14px; border-bottom:1px solid var(--line2); vertical-align:middle}
table.data tr:last-child td{border-bottom:none}
table.data tbody tr{cursor:pointer; transition:.1s}
table.data tbody tr:hover{background:var(--paper2)}
table.data tr.norow td{text-align:center; color:var(--muted); padding:34px; cursor:default}
table.data tr.norow:hover{background:transparent}
.code-cell{font-family:"IBM Plex Mono",monospace; font-weight:600; color:var(--moss-d)}
.alias{font-family:"IBM Plex Mono",monospace; font-size:11px; color:var(--amber-d)}

/* forms */
.field{margin-bottom:15px}
.field label{display:block; font-family:"IBM Plex Mono",monospace; font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink2); margin-bottom:6px; font-weight:600}
.field label .req{color:var(--terra)}
input[type=text], input[type=number], input[type=date], input[type=datetime-local], select, textarea{
  width:100%; font-family:"IBM Plex Sans",sans-serif; font-size:13.5px; padding:9px 11px; border:1px solid var(--line); border-radius:8px; background:var(--paper2); color:var(--ink);
}
input.mono, select.mono{font-family:"IBM Plex Mono",monospace}
input:focus, select:focus, textarea:focus{outline:none; border-color:var(--moss); box-shadow:0 0 0 3px var(--moss-l); background:#fff}
textarea{resize:vertical; min-height:64px}
.grid2{display:grid; grid-template-columns:1fr 1fr; gap:0 14px}
.grid3{display:grid; grid-template-columns:1fr 1fr 1fr; gap:0 14px}
.hint{font-size:11.5px; color:var(--muted); margin-top:5px}
.code-preview{font-family:"IBM Plex Mono",monospace; font-weight:600; font-size:17px; color:var(--moss-d); background:var(--moss-l); border:1px dashed var(--moss); border-radius:8px; padding:11px 14px; display:flex; align-items:center; justify-content:space-between; gap:10px}

/* modal */
.overlay{position:fixed; inset:0; background:rgba(27,32,27,.5); backdrop-filter:blur(3px); z-index:60; display:none; align-items:flex-start; justify-content:center; padding:30px 16px; overflow-y:auto}
.overlay.show{display:flex}
.modal{background:var(--paper2); border:1px solid var(--line); border-radius:14px; max-width:720px; width:100%; box-shadow:0 20px 60px rgba(20,30,18,.3); animation:pop .18s ease}
@keyframes pop{from{transform:translateY(8px) scale(.99); opacity:0}to{transform:none; opacity:1}}
.modal-h{padding:16px 20px; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between}
.modal-h h3{margin:0; font-family:"IBM Plex Serif",serif; font-size:18px}
.modal-b{padding:20px; max-height:70vh; overflow-y:auto}
.modal-f{padding:14px 20px; border-top:1px solid var(--line); display:flex; gap:10px; justify-content:flex-end; flex-wrap:wrap}
.x{cursor:pointer; border:none; background:transparent; color:var(--muted); padding:4px; border-radius:6px; display:grid; place-items:center}
.x:hover{background:var(--line2); color:var(--ink)}
.x svg{width:18px; height:18px}

/* detail */
.kv{display:grid; grid-template-columns:140px 1fr; gap:8px 14px; font-size:13.5px}
.kv dt{font-family:"IBM Plex Mono",monospace; font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); padding-top:2px}
.kv dd{margin:0; color:var(--ink)}
.divider{height:1px; background:var(--line2); margin:16px 0}

/* qr */
.qrbox{display:grid; place-items:center; gap:10px}
.qr-render{background:#fff; padding:12px; border:1px solid var(--line); border-radius:10px; display:inline-block; line-height:0}
.qr-render img, .qr-render canvas{display:block}

/* timeline */
.tl{position:relative; padding-left:22px}
.tl::before{content:""; position:absolute; left:6px; top:4px; bottom:4px; width:2px; background:var(--line)}
.tl-item{position:relative; padding:0 0 16px}
.tl-item::before{content:""; position:absolute; left:-19px; top:4px; width:11px; height:11px; border-radius:50%; background:var(--card); border:2.5px solid var(--moss)}
.tl-item .when{font-family:"IBM Plex Mono",monospace; font-size:11px; color:var(--muted)}
.tl-item .what{font-weight:600; font-size:13.5px}
.tl-item .who{font-size:12px; color:var(--ink2)}

/* trace tree */
.tree{font-family:"IBM Plex Sans",sans-serif}
.tnode{border:1px solid var(--line); border-radius:9px; background:var(--card); padding:9px 12px; display:inline-flex; align-items:center; gap:10px; box-shadow:var(--shadow)}
.tnode .tc{font-family:"IBM Plex Mono",monospace; font-weight:600; color:var(--moss-d); font-size:13px}
.tchildren{margin:8px 0 8px 26px; padding-left:18px; border-left:2px dashed var(--line)}
.trow{margin:8px 0; position:relative}

/* filter bar */
.filters{display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:14px}
.filters select, .filters input{width:auto; min-width:140px; font-size:12.5px; padding:7px 10px}
.chiprow{display:flex; gap:6px; flex-wrap:wrap}
.chip{font-family:"IBM Plex Mono",monospace; font-size:11px; padding:4px 10px; border-radius:30px; border:1px solid var(--line); background:var(--card); cursor:pointer; color:var(--ink2)}
.chip.on{background:var(--moss); color:#fff; border-color:var(--moss-d)}

/* toast */
#toast{position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--ink); color:var(--paper); padding:12px 18px; border-radius:10px; font-size:13.5px; font-weight:500; box-shadow:0 10px 30px rgba(0,0,0,.3); opacity:0; pointer-events:none; transition:.25s; z-index:90; display:flex; align-items:center; gap:9px; max-width:90vw}
#toast.show{opacity:1; transform:translateX(-50%)}
#toast svg{width:17px; height:17px; flex:0 0 auto}

/* empty state */
.empty{text-align:center; padding:50px 20px; color:var(--muted)}
.empty svg{width:46px; height:46px; opacity:.4; margin-bottom:12px}
.empty h3{font-family:"IBM Plex Serif",serif; color:var(--ink2); margin:0 0 6px}

/* iso table */
.iso-tbl{width:100%; border-collapse:collapse; font-size:13px}
.iso-tbl th, .iso-tbl td{text-align:left; padding:10px 12px; border-bottom:1px solid var(--line2); vertical-align:top}
.iso-tbl th{font-family:"IBM Plex Mono",monospace; font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); background:var(--paper2)}
.iso-tbl td:first-child{font-family:"IBM Plex Mono",monospace; font-weight:600; color:var(--moss-d); white-space:nowrap}
.flowstep{display:flex; align-items:center; gap:0; flex-wrap:wrap; margin:6px 0 4px}
.flowstep .fs{font-family:"IBM Plex Mono",monospace; font-size:11.5px; font-weight:600; padding:7px 12px; border-radius:8px; background:var(--moss-l); color:var(--moss-d); border:1px solid var(--moss)}
.flowstep .ar{color:var(--muted); padding:0 6px; font-weight:700}
.callout{border-left:3px solid var(--amber); background:var(--amber-l); padding:12px 14px; border-radius:0 8px 8px 0; font-size:13px; margin:14px 0}

/* print labels */
#print-area{display:none}
@media print{
  /* sembunyikan seluruh antarmuka; hanya area cetak yang tampil (display, bukan visibility,
     agar paginasi stiker termal tidak menyisakan halaman kosong) */
  body.printing > *{ display:none !important; }
  body.printing #print-area{ display:block !important; }

  /* Mode lembar A4 (grid label) */
  #print-area.sheet{ padding:8mm; }
  @page{ margin:8mm; }

  /* Mode termal 40×40 mm */
  @page thermal{ size:40mm 40mm; margin:0; }
  #print-area.thermal{ padding:0; }
  #print-area.thermal .lbl-t{ page:thermal; }
}
/* --- label A4 (grid) --- */
.lbl-grid{display:grid; grid-template-columns:repeat(3, 1fr); gap:6mm}
.lbl{border:1.2px solid #1b201b; border-radius:3mm; padding:3mm; display:flex; gap:3mm; align-items:center; break-inside:avoid; background:#fff; color:#000}
.lbl .qh{flex:0 0 auto}
.lbl .qt{font-family:"IBM Plex Mono",monospace; min-width:0}
.lbl .qt .lc{font-weight:600; font-size:11px; word-break:break-all}
.lbl .qt .la{font-size:9px; color:#b86a1f}
.lbl .qt .ld{font-size:8.5px; color:#333; margin-top:2px; line-height:1.35}
.lbl .qt .ls{font-size:7.5px; color:#555; margin-top:3px; letter-spacing:.04em; text-transform:uppercase}
/* --- label termal 40×40 mm (teks hitam pekat utk printer termal) --- */
.lbl-t{ width:40mm; height:40mm; box-sizing:border-box; overflow:hidden; background:#fff; color:#000;
        font-family:"IBM Plex Mono",monospace; padding:1.8mm 1.8mm;
        page-break-after:always; break-after:page; }
.lbl-t:last-child{ page-break-after:auto; break-after:auto; }
.lbl-t .tc{ font-weight:700; font-size:2.8mm; line-height:1.02; text-align:center; letter-spacing:-.18px;
            white-space:nowrap; overflow:hidden; color:#000; }
.lbl-t .row{ display:table; width:100%; table-layout:fixed; margin-top:1.3mm; }
.lbl-t .qbox{ display:table-cell; width:22mm; height:22mm; vertical-align:middle; }
.lbl-t .qbox img, .lbl-t .qbox canvas, .lbl-t .qbox table{ width:22mm !important; height:22mm !important; display:block; image-rendering:pixelated; }
.lbl-t .info{ display:table-cell; vertical-align:top; padding-left:1.5mm; line-height:1.2; color:#000; }
.lbl-t .info .a{ font-size:2.05mm; font-weight:700; color:#000; word-break:break-word; }
.lbl-t .info .m{ font-size:1.9mm; color:#000; word-break:break-word; margin-top:.4mm; }
.lbl-t .info .d{ font-size:1.75mm; color:#000; margin-top:.35mm; }
.lbl-t .info .o{ font-size:1.55mm; color:#000; margin-top:.65mm; letter-spacing:.02em; text-transform:uppercase; }

@media (max-width:760px){
  .grid2,.grid3{grid-template-columns:1fr}
  .kv{grid-template-columns:1fr}
  .kv dt{padding-top:8px}
  .lbl-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<header class="top">
  <div class="top-inner">
    <div class="brand">
      <div class="logo" id="brandLogo" title="Lab Energi Terbarukan POLIBAN">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3h6M10 3v6.5L5.5 17a2 2 0 0 0 1.8 3h9.4a2 2 0 0 0 1.8-3L14 9.5V3"/><path d="M7.5 14h9"/></svg>
      </div>
      <div>
        <h1 class="serif" id="brandName">Lab Energi Terbarukan POLIBAN</h1>
        <div class="sub" id="brandSub">Politeknik Negeri Banjarmasin · Ketertelusuran Sampel (SITRAS) · ISO/IEC 17025</div>
      </div>
    </div>
    <div class="spacer"></div>
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="globalSearch" placeholder="Cari kode / alias / asal…" oninput="App.globalSearch(this.value)">
    </div>
    <button class="btn" onclick="App.openSyncHub()" title="Buka pengaturan sinkron atau tarik data GitHub">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-2.6-6.4M21 4v5h-5"/></svg>
      Sinkron Data
    </button>
    <button class="btn" onclick="App.openResetModal()" title="Reset data (commissioning)" style="color:#a8432e;padding-left:11px;padding-right:11px">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 2v6h6"/><path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"/></svg>
    </button>
    <button class="btn pri" onclick="App.openRegister()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      Daftar Sampel
    </button>
  </div>
  <nav class="tabs" id="tabs"></nav>
</header>

<main id="app"></main>

<div class="overlay" id="overlay" onclick="if(event.target===this)App.closeModal()">
  <div class="modal" id="modal"></div>
</div>

<div id="print-area"></div>
<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
/* ============================================================
   SITRAS — Sistem Ketertelusuran Sampel Laboratorium
   Alur: Kode Sampel → Buku Induk → Label QR → Penyimpanan
         → Pengujian/Pemakaian → Arsip Hasil
   Disesuaikan riset pirolisis tengkawang (Shorea stenoptera).
   ============================================================ */

/* ---------- Konstanta domain ---------- */
const MATERIALS = {
  SST:'Shorea stenoptera (tengkawang)',
  TKW:'Tengkawang (umum)',
};
const TYPES = {
  RAW:'Biomassa mentah (as-received)',
  SS :'Subsampel preparasi (Whole Biomass)',
  BO :'Bio-oil (produk cair)',
  BC :'Biochar (produk padat)',
  AQ :'Fasa air / aqueous',
  NCG:'Gas non-kondensabel',
  OTH:'Lainnya',
};
const STATUS = {
  'Terdaftar':  {c:'#7c8175', b:'#ece8df'},
  'Disimpan':   {c:'#2e5d3e', b:'#dcebdf'},
  'Diuji':      {c:'#8a5a1f', b:'#f3e6cd'},
  'Habis':      {c:'#a8432e', b:'#f1ddd6'},
  'Diarsipkan': {c:'#3a5170', b:'#dde3ee'},
  'Dibuang':    {c:'#5a5a5a', b:'#e4e2dc'},
};
const TEST_STATUS = {
  'Direncanakan':{c:'#7c8175', b:'#ece8df'},
  'Berjalan':    {c:'#8a5a1f', b:'#f3e6cd'},
  'Selesai':     {c:'#2e5d3e', b:'#dcebdf'},
  'Dibatalkan':  {c:'#a8432e', b:'#f1ddd6'},
};
const TEST_CATS = ['Proksimat','Ultimat (CHNS-O)','FTIR-ATR','Pirolisis (RSM-CCD run)','Nilai kalor (HHV)','Kadar air','Densitas / bulk density','GC-MS bio-oil','Bilangan asam','Lainnya'];
const STORAGE_COND = ['Suhu ruang','Desikator','Lemari asam','Kulkas 4°C','Freezer -20°C','Botol gelap','Vakum / kedap'];

/* ---------- Lapisan penyimpanan (window.storage + fallback memori) ---------- */
const Store = {
  mem:{},
  async get(key){
    try{ if(window.storage&&window.storage.get){ const r=await window.storage.get(key); if(r&&r.value!=null) return JSON.parse(r.value); } }
    catch(e){/* key tidak ada / storage off → fallback */}
    return (key in this.mem)? this.mem[key] : null;
  },
  async set(key,val){
    this.mem[key]=val;
    try{ if(window.storage&&window.storage.set){ await window.storage.set(key, JSON.stringify(val)); } }catch(e){/* memori saja */}
    return val;
  }
};

function fmtDate(s){ if(!s) return '—'; const d=new Date(s); if(isNaN(d)) return s; return d.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'}); }
function fmtDT(s){ if(!s) return '—'; const d=new Date(s); if(isNaN(d)) return s; return d.toLocaleString('id-ID',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}); }
function num(v){ const n=parseFloat(v); return isNaN(n)?0:n; }
function fmtNum(n){ if(n==null||n==='') return '—'; const x=Number(n); return Number.isInteger(x)? x.toLocaleString('id-ID') : x.toLocaleString('id-ID',{maximumFractionDigits:3}); }

function cfgDefaults(cfg){
  const next = (cfg && typeof cfg==='object') ? {...cfg} : {};
  if(!hasOwn(next,'origin') || !next.origin) next.origin='LHI';
  if(!hasOwn(next,'labName') || !String(next.labName||'').trim()) next.labName = DEFAULT_LAB_NAME;
  if(!hasOwn(next,'labSub')  || !String(next.labSub||'').trim())  next.labSub  = DEFAULT_LAB_SUB;
  if(!hasOwn(next,'qrUrl')) next.qrUrl = DEFAULT_QR_URL;
  if(!hasOwn(next,'sheetBI')) next.sheetBI = DEFAULT_SHEET_BI;
  if(!hasOwn(next,'sheetUJI')) next.sheetUJI = '';
  if(!hasOwn(next,'sheetLOG')) next.sheetLOG = '';
  if(!hasOwn(next,'csvSourceMigrated')) next.csvSourceMigrated = false;
  if(!next.csvSourceMigrated && next.sheetBI===LEGACY_DEFAULT_SHEET_BI){
    next.sheetBI = '';
    next.csvSourceMigrated = true;
  }
  if(!hasOwn(next,'githubBranch') || !String(next.githubBranch||'').trim()) next.githubBranch = DEFAULT_GITHUB_BRANCH;
  if(!hasOwn(next,'githubPath') || !String(next.githubPath||'').trim()) next.githubPath = DEFAULT_GITHUB_PATH;
  if(!hasOwn(next,'githubAutoSync')) next.githubAutoSync = false;
  if(!hasOwn(next,'githubAutoPull')) next.githubAutoPull = false;
  if(!hasOwn(next,'sheetWriteUrl') || !String(next.sheetWriteUrl||'').trim()) next.sheetWriteUrl = DEFAULT_SHEET_WRITE_URL;
  if(!hasOwn(next,'sheetWriteToken')) next.sheetWriteToken = '';
  if(!hasOwn(next,'sheetWriteAutoSync')) next.sheetWriteAutoSync = true;
  if(!hasOwn(next,'labelModeDefault') || !['thermal','a4'].includes(next.labelModeDefault)) next.labelModeDefault = 'thermal';
  if(!hasOwn(next,'labelCopiesDefault') || !Number.isFinite(Number(next.labelCopiesDefault))) next.labelCopiesDefault = 1;
  if(!hasOwn(next,'labelAutoPrint')) next.labelAutoPrint = false;
  if(!hasOwn(next,'labelFooter') || !String(next.labelFooter||'').trim()) next.labelFooter = 'LTO POLIBAN';
  if(!(String(next.githubOwner||'').trim() && String(next.githubRepo||'').trim())) {
    next.githubAutoPull = false;
    next.githubAutoSync = false;
  }
  return next;
}
async function loadDB(){
  const rawCfg = (await Store.get(K.CFG)) || {origin:'LHI'};
  DB.samples   = (await Store.get(K.S))  || [];
  DB.tests     = (await Store.get(K.T))  || [];
  DB.movements = (await Store.get(K.M))  || [];
  DB.cfg       = cfgDefaults(rawCfg);
  if(JSON.stringify(DB.cfg)!==JSON.stringify(rawCfg)){
    await Store.set(K.CFG, DB.cfg);
  }
  if(hasGitHubSource() && DB.cfg.githubAutoPull!==false){
    await pullFromGitHub({manual:false, quiet:true, renderAfter:false});
  }
}
async function save(part, opts={}){
  if(part==='S') await Store.set(K.S, DB.samples);
  if(part==='T') await Store.set(K.T, DB.tests);
  if(part==='M') await Store.set(K.M, DB.movements);
  if(part==='CFG') await Store.set(K.CFG, DB.cfg);
  if(!opts.skipRemote){
    scheduleGitHubPush(part);
    scheduleSheetPush(part);
  }
}

/* ---------- Generator kode sampel ----------
   Format: {MAT}-{TYPE}-{ORIGIN}-{YY}-{NNN}   (cth: SST-RAW-LHI-26-001)
   Produk pirolisis dapat juga memakai run-id (cth: BO-R05) lewat alias. */
function genCode(material, type, origin, dateStr){
  const yy = String((dateStr||todayISO()).slice(0,4)).slice(-2);
  let seq = DB.samples.filter(s=> s.material===material && s.type===type && (s.regDate||'').slice(2,4)===yy).length + 1;
  let code;
  do{ code = `${material}-${type}-${origin}-${yy}-${pad(seq,3)}`; seq++; } while(DB.samples.some(s=>s.id===code));
  return code;
}

          </tr>`).join('')}

function viewTrace(){
  const roots = DB.samples.filter(s=>!s.parent || !DB.samples.some(x=>x.id===s.parent));
  return `
  <div class="view-head"><div><h2>Peta Ketertelusuran</h2><p>Visualisasi rantai asal-usul: dari biomassa mentah → subsampel preparasi → run pirolisis → produk (bio-oil/biochar). Klik simpul untuk detail. Inilah inti yang diminta ISO/IEC 17025: keterlacakan dari hasil kembali ke sampel asal.</p></div></div>
  ${roots.length? `<div class="card pad"><div class="tree">${roots.map(r=>traceNode(r,0)).join('')}</div></div>` :
    `<div class="card"><div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 3v12M18 9v12"/></svg><h3>Belum ada rantai sampel</h3><p>Daftarkan sampel dan tautkan ke induknya untuk membangun peta.</p></div></div>`}
  <div class="callout" style="margin-top:16px"><b>Cara membaca:</b> garis putus-putus menandai hubungan induk → turunan. Setiap produk yang diuji dapat dirunut mundur sampai ke biomassa lapangan beserta tanggal, lokasi pengambilan, dan kondisi penyimpanannya.</div>`;
}
function traceNode(s, depth){
  const children = DB.samples.filter(x=>x.parent===s.id);
  const tcount = DB.tests.filter(t=>t.sampleCode===s.id).length;
  const sm = STATUS[s.status]||{c:'#7c8175'};
  return `<div class="trow">
    <span class="tnode" onclick="App.detail('${esc(s.id)}')" style="cursor:pointer;border-left:4px solid ${sm.c}">
      <span class="tc">${esc(s.id)}</span>
      <span class="micro" style="letter-spacing:.06em">${esc(s.type)}</span>
      ${s.alias?`<span class="alias">${esc(s.alias)}</span>`:''}
      ${tcount?`<span class="pill" style="color:var(--slate);background:var(--slate-l)"><span class="dot" style="background:var(--slate)"></span>${tcount} uji</span>`:''}
      ${pill(s.status)}
    </span>
    ${children.length? `<div class="tchildren">${children.map(c=>traceNode(c,depth+1)).join('')}</div>`:''}
  </div>`;
}

/* ============================================================
   FILTER & PENCARIAN
   ============================================================ */
function applyFilter(list){
  let r = list.slice();
  if(FILTER.type) r=r.filter(s=>s.type===FILTER.type);
  if(FILTER.status) r=r.filter(s=>s.status===FILTER.status);
  const q=(FILTER.q||'').trim().toLowerCase();
  if(q) r=r.filter(s=> (s.id+' '+(s.alias||'')+' '+(s.source||'')+' '+(s.custodian||'')+' '+(s.loc||'')).toLowerCase().includes(q));
  return r.sort((a,b)=> (b.regDate||'').localeCompare(a.regDate||'') || (b.createdAt||'').localeCompare(a.createdAt||''));
}
function setFilter(k,v){ FILTER[k]=v; if(VIEW==='db') $('#app').innerHTML=viewDB(); }
function globalSearch(v){
  const q=v.trim().toLowerCase();
  if(!q) return;
  // Jika ada kecocokan tunggal kode -> buka detail; jika tidak, ke buku induk dengan filter
  const exact = DB.samples.find(s=> s.id.toLowerCase()===q || (s.alias||'').toLowerCase()===q);
  if(exact){ /* tunggu enter? buka langsung */ }
}
$('#globalSearch')&&$('#globalSearch').addEventListener('keydown', e=>{
  if(e.key==='Enter'){
    const q=e.target.value.trim().toLowerCase();
    const exact = DB.samples.find(s=> s.id.toLowerCase()===q || (s.alias||'').toLowerCase()===q);
    if(exact){ detail(exact.id); return; }
    FILTER.q=e.target.value; VIEW='db'; render();
  }
});

/* ============================================================
   QR
   ============================================================ */
function qrTextFromCode(code){
  const t = (DB.cfg && DB.cfg.qrUrl || '').trim();
  if(t && t.indexOf('{kode}')>=0 && code && code!=='—') return t.replace('{kode}', encodeURIComponent(code));
  return code;                       // mode lokal: QR memuat kode saja
}
function qrText(s){ return qrTextFromCode(s.id); }  // kode, atau URL berisi kode (lihat Panduan)
function qrPreviewText(){
  const sample = (DB.samples[0] && DB.samples[0].id) || 'SST-RAW-LHI-26-001';
  const t = (DB.cfg.qrUrl||'').trim();
  if(t && t.indexOf('{kode}')>=0) return t.replace('{kode}', encodeURIComponent(sample));
  if(t) return '(template tanpa {kode}) — sementara QR berisi: '+sample;
  return sample+'   (mode lokal: QR memuat kode saja)';
}
function labelModeValue(v){
  return v==='a4' ? 'a4' : 'thermal';
}
function labelCopiesValue(v){
  const n = parseInt(v, 10);
  if(!Number.isFinite(n) || n < 1) return 1;
  return Math.min(n, 20);
}
function labelFooterText(){
  return String((DB.cfg && DB.cfg.labelFooter) || 'LTO POLIBAN').trim() || 'LTO POLIBAN';
}
function labelContextLine(s){
  const parts = [];
  if(s.run) parts.push('Run ' + s.run);
  if(!s.run && s.parent) parts.push('Induk ' + s.parent);
  if(s.loc) parts.push(s.loc);
  return parts.slice(0,2).join(' · ');
}
function regLabelPrefs(){
  return {
    mode: labelModeValue($('#f_labelMode') ? $('#f_labelMode').value : DB.cfg.labelModeDefault),
    copies: labelCopiesValue($('#f_labelCopies') ? $('#f_labelCopies').value : DB.cfg.labelCopiesDefault),
    autoPrint: !!($('#f_autoPrint') && $('#f_autoPrint').checked),
    footer: ($('#f_labelFooter') ? $('#f_labelFooter').value : labelFooterText()).trim() || 'LTO POLIBAN',
  };
}
async function rememberLabelPrefs(prefs){
  if(!prefs) return;
  DB.cfg.labelModeDefault = labelModeValue(prefs.mode);
  DB.cfg.labelCopiesDefault = labelCopiesValue(prefs.copies);
  DB.cfg.labelAutoPrint = !!prefs.autoPrint;
  DB.cfg.labelFooter = String(prefs.footer || 'LTO POLIBAN').trim() || 'LTO POLIBAN';
  await save('CFG',{skipRemote:true});
}
function makeQR(el, text, size, level){
  if(!el) return;
  el.innerHTML='';
  if(typeof QRCode==='undefined'){ el.innerHTML='<div class="mono" style="width:'+size+'px;height:'+size+'px;display:grid;place-items:center;color:var(--terra);font-size:10px;text-align:center;padding:8px">QR offline<br>('+esc(text)+')</div>'; return; }
  try{ new QRCode(el,{text:String(text),width:size,height:size,correctLevel:(level||QRCode.CorrectLevel.M),colorDark:'#000000',colorLight:'#ffffff'}); }
  catch(e){ el.textContent=text; }
}

function buildPrintJobs(codes, copies, footer){
  const count = labelCopiesValue(copies || DB.cfg.labelCopiesDefault);
  const note = String(footer || labelFooterText()).trim() || 'LTO POLIBAN';
  const jobs = [];
  codes.map(c=>DB.samples.find(x=>x.id===c)).filter(Boolean).forEach(sample=>{
    for(let i=0;i<count;i++){
      jobs.push({sample, footer:note, key:`${sample.id}__${i+1}`});
    }
  });
  return jobs;
}
function labelHTML_A4(job){
  const s = job.sample;
  const ctx = labelContextLine(s);
  return `<div class="lbl"><div class="qh" id="lq-${esc(job.key)}"></div>
    <div class="qt">
      <div class="lc">${esc(s.id)}</div>
      ${s.alias?`<div class="la">${esc(s.alias)}</div>`:''}
      <div class="ld">${esc((MATERIALS[s.material]||s.material||'').split(' (')[0])} · ${esc(s.type)}<br>Reg: ${esc(fmtDate(s.regDate))}${ctx?'<br>'+esc(ctx):''}</div>
      <div class="ls">${esc(job.footer)}<br>ISO/IEC 17025</div>
    </div></div>`;
}
function labelHTML_T(job){
  const s = job.sample;
  const mat = esc((MATERIALS[s.material]||s.material||'').split(' (')[0]);
  const ctx = labelContextLine(s);
  return `<div class="lbl-t">
    <div class="tc">${esc(s.id)}</div>
    <div class="row">
      <div class="qbox" id="lq-${esc(job.key)}"></div>
      <div class="info">
        ${s.alias?`<div class="a">${esc(s.alias)}</div>`:''}
        <div class="m">${mat} · ${esc(s.type)}</div>
        <div class="d">Reg: ${esc(fmtDate(s.regDate))}</div>
        ${ctx?`<div class="d">${esc(ctx)}</div>`:''}
        <div class="o">${esc(job.footer)}</div>
      </div>
    </div></div>`;
}
function doPrint(codes, mode, copies, footer){
  mode = labelModeValue(mode || DB.cfg.labelModeDefault);
  const jobs = buildPrintJobs(codes, copies, footer);
  if(!jobs.length){ toast('Tidak ada sampel dipilih','err'); return; }
  const area=$('#print-area');
  if(mode==='thermal'){
    area.className='thermal';
    area.innerHTML = jobs.map(labelHTML_T).join('');
    jobs.forEach(job=> makeQR(document.getElementById('lq-'+job.key), qrText(job.sample), 240, (typeof QRCode!=='undefined'?QRCode.CorrectLevel.L:null)));
  } else {
    area.className='sheet';
    area.innerHTML = `<div style="font-family:'IBM Plex Mono',monospace;font-size:11px;margin-bottom:6mm;color:#333">Label Sampel — ${esc(DB.cfg.labName||DEFAULT_LAB_NAME)} · dicetak ${new Date().toLocaleString('id-ID')}</div><div class="lbl-grid">${jobs.map(labelHTML_A4).join('')}</div>`;
    jobs.forEach(job=> makeQR(document.getElementById('lq-'+job.key), qrText(job.sample), 78));
  }
  document.body.classList.add('printing');
  const done=()=>{ document.body.classList.remove('printing'); window.removeEventListener('afterprint',done); };
  window.addEventListener('afterprint', done);
  setTimeout(()=>{ window.print(); }, 350);
}
function printOne(code){
  const mode = labelModeValue(DB.cfg.labelModeDefault);
  const copies = labelCopiesValue(DB.cfg.labelCopiesDefault);
  toast(mode==='thermal' ? 'Cek setelan: kertas 40x40, Margins None, Headers/footers off' : 'Siapkan printer A4 dan pastikan skala 100%');
  doPrint([code], mode, copies, labelFooterText());
}

function readSampleForm(){
  const manual = $('#manualCode') && $('#manualCode').checked;
  const material=$('#f_material').value, type=$('#f_type').value, origin=($('#f_origin').value||'LHI').trim().toUpperCase(), regDate=$('#f_regDate').value||todayISO();
  let code = manual ? ($('#f_code').value||'').trim() : genCode(material,type,origin,regDate);
  const mass=num($('#f_mass').value);
  return {
    id:code, alias:($('#f_alias').value||'').trim(), material, type, origin, regDate,
    source:($('#f_source').value||'').trim(), parent:$('#f_parent').value||'',
    massInitial:mass, massCurrent:mass, unit:$('#f_unit').value, moisture:($('#f_moist').value||''),
    cond:($('#f_cond').value||'').trim(), custodian:($('#f_custodian').value||'').trim(), run:($('#f_run').value||'').trim(),
    notes:($('#f_notes').value||'').trim(), loc:($('#f_loc').value||'').trim(), storecond:$('#f_storecond').value, status:$('#f_status').value,
    createdAt:new Date().toISOString()
  };
}
async function saveSample(forceThermal=false){
  const s = readSampleForm();
  const prefs = regLabelPrefs();
  if(!s.id){ toast('Kode sampel wajib diisi','err'); return; }
  if(DB.samples.some(x=>x.id===s.id)){ toast('Kode '+s.id+' sudah ada','err'); return; }
  await rememberLabelPrefs(prefs);
  DB.samples.push(s); await save('S');
  // log penyimpanan otomatis bila ada lokasi
  if(s.loc){ DB.movements.push({id:uid('mov'), sampleCode:s.id, action:'Masuk', toLocation:s.loc, datetime:new Date().toISOString(), person:s.custodian||'', note:'Registrasi awal'}); await save('M'); }
  toast('Sampel '+s.id+' tersimpan ke buku induk');
  VIEW='db'; render();
  setTimeout(()=>detail(s.id), 120);
  if(forceThermal || prefs.autoPrint){
    const mode = forceThermal ? 'thermal' : prefs.mode;
    setTimeout(()=>doPrint([s.id], mode, prefs.copies, prefs.footer), 220);
  }
}

function _catChange(){
  const c=$('#t_cat')&&$('#t_cat').value;
  if($('#pyroFields')) $('#pyroFields').style.display = (c==='Pirolisis (RSM-CCD run)')?'block':'none';
}
function _saveTest(editId){
  const sampleCode=$('#t_sample').value, cat=$('#t_cat').value;
  if(!sampleCode){ toast('Pilih sampel','err'); return; }
  const isPyro = cat==='Pirolisis (RSM-CCD run)';
  const obj = {
    sampleCode, category:cat, method:$('#t_method').value.trim(), lab:$('#t_lab').value.trim(),
    analyst:$('#t_analyst').value.trim(), status:$('#t_status').value, dateStart:$('#t_start').value, dateEnd:$('#t_end').value,
    massUsed:num($('#t_mass').value), certNo:$('#t_cert').value.trim(), result:$('#t_result').value.trim(), fileRef:$('#t_file').value.trim(),
    temp:isPyro?$('#t_temp').value:'', rate:isPyro?$('#t_rate').value:'', hold:isPyro?$('#t_hold').value:'',
    params: isPyro? [$('#t_temp').value&&($('#t_temp').value+'°C'), $('#t_rate').value&&($('#t_rate').value+'°C/min'), $('#t_hold').value&&($('#t_hold').value+' min')].filter(Boolean).join(' · ') : ''
  };
  const s=DB.samples.find(x=>x.id===sampleCode);
  if(editId){
    const t=DB.tests.find(x=>x.id===editId);
    // koreksi stok: kembalikan massa lama lalu kurangi massa baru
    if(s){ s.massCurrent = num(s.massCurrent) + num(t.massUsed) - num(obj.massUsed); if(s.massCurrent<0)s.massCurrent=0; }
    Object.assign(t,obj); save('T');
  }else{
    obj.id=uid('test'); obj.createdAt=new Date().toISOString();
    DB.tests.push(obj); save('T');
    if(s && obj.massUsed>0){ s.massCurrent=Math.max(0, num(s.massCurrent)-obj.massUsed); }
  }
  // update status sampel
  if(s){
    if(num(s.massCurrent)<=0 && ['RAW','SS'].includes(s.type)) s.status='Habis';
    else if(obj.status==='Berjalan' && s.status!=='Habis') s.status='Diuji';
    save('S');
  }
  toast(editId?'Pengujian diperbarui':'Pengujian dicatat'); render(); detail(sampleCode);
}
function _delTest(id){
  const t=DB.tests.find(x=>x.id===id); if(!t) return;
  const s=DB.samples.find(x=>x.id===t.sampleCode);
  if(s){ s.massCurrent=num(s.massCurrent)+num(t.massUsed); save('S'); }
  DB.tests=DB.tests.filter(x=>x.id!==id); save('T');
  toast('Uji dihapus'); render(); if(s) detail(s.id); else closeModal();
}

/* ============================================================
   EKSPOR CSV
   ============================================================ */
function toCSV(headers, rows){
  const e=v=>'"'+String(v==null?'':v).replace(/"/g,'""')+'"';
  return headers.map(h=>e(h.l)).join(',')+'\n'+rows.map(r=>headers.map(h=>e(typeof h.f==='function'?h.f(r):r[h.k])).join(',')).join('\n');
}
function download(name, text){
  const blob=new Blob(['\ufeff'+text],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=name; document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1500);
}
function exportCSV(which){
  let h, rows, name;
  if(which==='samples'){
    h=[{l:'Kode',k:'id'},{l:'Alias',k:'alias'},{l:'Material',f:s=>MATERIALS[s.material]||s.material},{l:'Tipe',k:'type'},{l:'Asal',k:'source'},{l:'Induk',k:'parent'},{l:'Run',k:'run'},{l:'Massa awal',k:'massInitial'},{l:'Massa kini',k:'massCurrent'},{l:'Satuan',k:'unit'},{l:'Kadar air %',k:'moisture'},{l:'Kondisi terima',k:'cond'},{l:'Lokasi',k:'loc'},{l:'Kondisi simpan',k:'storecond'},{l:'Status',k:'status'},{l:'Custodian',k:'custodian'},{l:'Tgl reg',k:'regDate'},{l:'Catatan',k:'notes'}];
    rows=DB.samples; name='buku-induk-sampel.csv';
  } else if(which==='tests'){
    h=[{l:'Sampel',k:'sampleCode'},{l:'Jenis uji',k:'category'},{l:'Parameter',k:'params'},{l:'Metode',k:'method'},{l:'Lab',k:'lab'},{l:'Analis',k:'analyst'},{l:'Status',k:'status'},{l:'Tgl mulai',k:'dateStart'},{l:'Tgl selesai',k:'dateEnd'},{l:'Massa terpakai',k:'massUsed'},{l:'No laporan',k:'certNo'},{l:'Hasil',k:'result'},{l:'Berkas',k:'fileRef'}];
    rows=DB.tests; name='register-pengujian.csv';
  } else {
    h=[{l:'Sampel',k:'sampleCode'},{l:'Aksi',k:'action'},{l:'Dari',k:'fromLocation'},{l:'Ke',k:'toLocation'},{l:'Waktu',k:'datetime'},{l:'Oleh',k:'person'},{l:'Catatan',k:'note'}];
    rows=DB.movements; name='log-penyimpanan.csv';
  }
  if(!rows.length){ toast('Tidak ada data untuk diekspor','err'); return; }
  download(name, toCSV(h,rows)); toast('CSV diekspor: '+name);
}

/* ============================================================
   DATABASE GITHUB (JSON tunggal) + cache lokal
   ============================================================ */
function gitTrim(v){ return String(v==null?'':v).trim(); }
function githubOwner(){ return gitTrim(DB.cfg.githubOwner); }
function githubRepo(){ return gitTrim(DB.cfg.githubRepo); }
function githubBranch(){ return gitTrim(DB.cfg.githubBranch || DEFAULT_GITHUB_BRANCH) || DEFAULT_GITHUB_BRANCH; }
function githubPath(){ return gitTrim(DB.cfg.githubPath || DEFAULT_GITHUB_PATH) || DEFAULT_GITHUB_PATH; }
function hasGitHubSource(){ return !!(githubOwner() && githubRepo() && githubPath()); }
function hasGitHubWrite(){ return hasGitHubSource() && !!gitTrim(DB.cfg.githubToken); }
function githubPathEncoded(){ return githubPath().split('/').filter(Boolean).map(encodeURIComponent).join('/'); }
function githubContentsUrl(){ return `https://api.github.com/repos/${encodeURIComponent(githubOwner())}/${encodeURIComponent(githubRepo())}/contents/${githubPathEncoded()}`; }
function githubReadUrl(){ return `${githubContentsUrl()}?ref=${encodeURIComponent(githubBranch())}`; }
function githubHeaders(){
  const h = {'Accept':'application/vnd.github+json'};
  const token = gitTrim(DB.cfg.githubToken);
  if(token) h.Authorization = `Bearer ${token}`;
  return h;
}
function b64EncodeUnicode(text){
  const bytes = new TextEncoder().encode(String(text));
  let binary = '';
  bytes.forEach(b=>binary += String.fromCharCode(b));
  return btoa(binary);
}
function b64DecodeUnicode(text){
  const clean = String(text||'').replace(/\n/g,'');
  const binary = atob(clean);
  const bytes = Uint8Array.from(binary, c=>c.charCodeAt(0));
  return new TextDecoder().decode(bytes);
}
function gitSharedConfig(){
  return {
    origin: DB.cfg.origin || 'LHI',
    qrUrl: hasOwn(DB.cfg,'qrUrl') ? DB.cfg.qrUrl : DEFAULT_QR_URL,
  };
}
function serializeGitHubDb(){
  return {
    schema: DB_SCHEMA,
    version: DB_SCHEMA_VERSION,
    updatedAt: new Date().toISOString(),
    app: 'SITRAS',
    sharedConfig: gitSharedConfig(),
    samples: DB.samples,
    tests: DB.tests,
    movements: DB.movements,
  };
}
function applyGitHubDb(payload){
  if(!payload || typeof payload!=='object') throw new Error('Format database GitHub tidak valid');
  DB.samples = Array.isArray(payload.samples) ? payload.samples : [];
  DB.tests = Array.isArray(payload.tests) ? payload.tests : [];
  DB.movements = Array.isArray(payload.movements) ? payload.movements : [];
  const shared = (payload.sharedConfig && typeof payload.sharedConfig==='object')
    ? payload.sharedConfig
    : ((payload.cfg && typeof payload.cfg==='object') ? payload.cfg : {});
  if(hasOwn(shared,'origin') && shared.origin) DB.cfg.origin = shared.origin;
  if(hasOwn(shared,'qrUrl')) DB.cfg.qrUrl = shared.qrUrl;
}
function captureGitHubConfigFromForm(){
  if(!$('#ghOwner')) return false;
  DB.cfg.githubOwner = gitTrim($('#ghOwner').value);
  DB.cfg.githubRepo = gitTrim($('#ghRepo').value);
  DB.cfg.githubBranch = gitTrim($('#ghBranch').value) || DEFAULT_GITHUB_BRANCH;
  DB.cfg.githubPath = gitTrim($('#ghPath').value) || DEFAULT_GITHUB_PATH;
  DB.cfg.githubToken = gitTrim($('#ghToken').value);
  DB.cfg.githubAutoPull = !!($('#ghAutoPull') && $('#ghAutoPull').checked);
  DB.cfg.githubAutoSync = !!($('#ghAutoSync') && $('#ghAutoSync').checked);
  return true;
}
function gitSourceSummary(){
  if(!hasGitHubSource()) return 'Nonaktif (opsional). App tetap bisa pakai data lokal + Google Sheets.';
  return `${githubOwner()}/${githubRepo()} @ ${githubBranch()} / ${githubPath()}`;
}
function gitStatusText(){
  if(!hasGitHubSource()) return 'GitHub nonaktif.';
  const parts = [];
  if(DB.cfg.lastGitHubPull) parts.push(`tarik ${fmtDT(DB.cfg.lastGitHubPull)}`);
  if(DB.cfg.lastGitHubPush) parts.push(`kirim ${fmtDT(DB.cfg.lastGitHubPush)}`);
  if(!parts.length) return 'Belum pernah sinkron.';
  return parts.join(' · ');
}
function clearGitHubRuntimeState(){
  GitHubSync.busy = false;
  GitHubSync.pending = false;
  clearTimeout(GitHubSync.timer);
  GitHubSync.timer = null;
  GitHubSync.lastError = '';
  GitHubSync.lastErrorAt = 0;
}
function clearGitHubConfigState(){
  DB.cfg.githubOwner = '';
  DB.cfg.githubRepo = '';
  DB.cfg.githubBranch = DEFAULT_GITHUB_BRANCH;
  DB.cfg.githubPath = DEFAULT_GITHUB_PATH;
  DB.cfg.githubToken = '';
  DB.cfg.githubAutoPull = false;
  DB.cfg.githubAutoSync = false;
  delete DB.cfg.lastGitHubPull;
  delete DB.cfg.lastGitHubPush;
  delete DB.cfg.lastGitHubSha;
  delete DB.cfg.lastGitHubError;
  clearGitHubRuntimeState();
}
function reportGitHubError(message, manual){
  const text = String(message||'Sinkron GitHub gagal');
  DB.cfg.lastGitHubError = text;
  if(manual){
    toast(text,'err');
  }else{
    const now = Date.now();
    if(GitHubSync.lastError!==text || (now-GitHubSync.lastErrorAt)>15000){
      GitHubSync.lastError = text;
      GitHubSync.lastErrorAt = now;
      toast(text,'err');
    }
  }
  if(VIEW==='guide') render();
}
function scheduleGitHubPush(reason){
  if(!hasGitHubSource() || !hasGitHubWrite() || DB.cfg.githubAutoSync===false) return;
  GitHubSync.pending = true;
  if(GitHubSync.busy) return;
  clearTimeout(GitHubSync.timer);
  GitHubSync.timer = setTimeout(()=>{
    GitHubSync.timer = null;
    pushToGitHub({manual:false, reason:reason||'autosave'});
  }, GITHUB_SYNC_DELAY_MS);
}

async function testGitHubConnection(){
  if(captureGitHubConfigFromForm()) await save('CFG',{skipRemote:true});
  if(!hasGitHubSource()){
    toast('Isi owner, repo, dan path dulu. Kalau tidak perlu GitHub, klik "Pakai tanpa GitHub".','err');
    return false;
  }
  try{
    const res = await fetch(githubReadUrl(), {headers: githubHeaders(), cache:'no-store'});
    if(res.status===404){
      delete DB.cfg.lastGitHubError;
      await save('CFG',{skipRemote:true});
      toast('Repo tersambung. File JSON belum ada, klik "Kirim ke GitHub" untuk membuatnya.');
      if(VIEW==='guide') render();
      return true;
    }
    if(res.status===401 || res.status===403){
      throw new Error(hasGitHubWrite()
        ? 'Token GitHub ditolak atau izin repo belum cukup. Pastikan Contents: Read and write aktif.'
        : 'Repo privat atau akses baca ditolak. Isi token GitHub bila repo tidak publik.');
    }
    if(!res.ok){
      const txt = await res.text();
      throw new Error(`Gagal menguji koneksi GitHub (HTTP ${res.status})${txt ? ': '+txt.slice(0,120) : ''}`);
    }
    const meta = await res.json();
    delete DB.cfg.lastGitHubError;
    await save('CFG',{skipRemote:true});
    toast(`Koneksi GitHub OK: ${githubOwner()}/${githubRepo()}${meta && meta.sha ? ' · '+String(meta.sha).slice(0,7) : ''}`);
    if(VIEW==='guide') render();
    return true;
  }catch(e){
    reportGitHubError(e.message||e, true);
    return false;
  }
}
async function pullFromGitHub({manual=true, quiet=false, renderAfter=true}={}){
  if(captureGitHubConfigFromForm()) await save('CFG',{skipRemote:true});
  if(!hasGitHubSource()){
    if(manual && !quiet) toast('Konfigurasi GitHub belum lengkap','err');
    return false;
  }
  try{
    const res = await fetch(githubReadUrl(), {headers: githubHeaders(), cache:'no-store'});
    if(res.status===404) throw new Error('File database GitHub belum ada. Kirim data lokal dulu ke repo.');
    if(!res.ok){
      const txt = await res.text();
      throw new Error(`Gagal menarik data GitHub (HTTP ${res.status})${txt ? ': '+txt.slice(0,120) : ''}`);
    }
    const meta = await res.json();
    const payload = JSON.parse(b64DecodeUnicode(meta.content||''));
    applyGitHubDb(payload);
    DB.cfg.lastGitHubPull = new Date().toISOString();
    DB.cfg.lastGitHubSha = meta.sha || DB.cfg.lastGitHubSha || '';
    DB.cfg.lastSync = DB.cfg.lastGitHubPull;
    DB.cfg = cfgDefaults(DB.cfg);
    await save('S',{skipRemote:true});
    await save('T',{skipRemote:true});
    await save('M',{skipRemote:true});
    await save('CFG',{skipRemote:true});
    if(renderAfter) render();
    if(manual && !quiet) toast(`Data GitHub dimuat: ${DB.samples.length} sampel`);
    return true;
  }catch(e){
    if(!quiet) reportGitHubError(e.message||e, manual);
    return false;
  }
}
async function pushToGitHub({manual=true, reason='manual'}={}){
  if(captureGitHubConfigFromForm()) await save('CFG',{skipRemote:true});
  if(!hasGitHubSource()){
    if(manual) toast('Konfigurasi GitHub belum lengkap','err');
    return false;
  }
  if(!hasGitHubWrite()){
    if(manual) toast('Token GitHub diperlukan untuk kirim data','err');
    return false;
  }
  if(GitHubSync.busy){
    GitHubSync.pending = true;
    return false;
  }
  GitHubSync.busy = true;
  GitHubSync.pending = false;
  clearTimeout(GitHubSync.timer);
  GitHubSync.timer = null;
  try{
    let existing = null;
    const head = await fetch(githubReadUrl(), {headers: githubHeaders(), cache:'no-store'});
    if(head.status!==404){
      if(!head.ok){
        const txt = await head.text();
        throw new Error(`Gagal membaca metadata GitHub (HTTP ${head.status})${txt ? ': '+txt.slice(0,120) : ''}`);
      }
      existing = await head.json();
    }
    const body = {
      message:`chore: update SITRAS database (${reason})`,
      content:b64EncodeUnicode(JSON.stringify(serializeGitHubDb(), null, 2)),
      branch:githubBranch(),
    };
    if(existing && existing.sha) body.sha = existing.sha;
    const res = await fetch(githubContentsUrl(), {
      method:'PUT',
      headers:{...githubHeaders(),'Content-Type':'application/json'},
      body:JSON.stringify(body),
    });
    if(res.status===409) throw new Error('Konflik versi GitHub. Tarik data terbaru dulu, lalu kirim ulang.');
    if(!res.ok){
      const txt = await res.text();
      throw new Error(`Gagal mengirim data ke GitHub (HTTP ${res.status})${txt ? ': '+txt.slice(0,160) : ''}`);
    }
    const out = await res.json();
    DB.cfg.lastGitHubPush = new Date().toISOString();
    DB.cfg.lastGitHubSha = (out.content && out.content.sha) || (out.commit && out.commit.sha) || DB.cfg.lastGitHubSha || '';
    DB.cfg.lastSync = DB.cfg.lastGitHubPush;
    delete DB.cfg.lastGitHubError;
    await save('CFG',{skipRemote:true});
    if(manual) toast('Database berhasil dikirim ke GitHub');
    if(VIEW==='guide') render();
    return true;
  }catch(e){
    reportGitHubError(e.message||e, manual);
    return false;
  }finally{
    GitHubSync.busy = false;
    if(GitHubSync.pending){
      GitHubSync.pending = false;
      scheduleGitHubPush('queued');
    }
  }
}

/* ============================================================

   ============================================================ */
function sheetWriteUrl(){ return gitTrim(DB.cfg.sheetWriteUrl); }
function sheetWriteToken(){ return gitTrim(DB.cfg.sheetWriteToken); }
function hasSheetWriteTarget(){ return !!sheetWriteUrl(); }
function sheetTargetSummary(){
  if(!hasSheetWriteTarget()) return 'Belum dikonfigurasi.';
  const raw = sheetWriteUrl().replace(/^https?:\/\//,'');
  return raw.length>78 ? raw.slice(0,77)+'…' : raw;
}
function sheetStatusText(){
  const parts = [];
  if(DB.cfg.lastSheetPush) parts.push(`kirim ${fmtDT(DB.cfg.lastSheetPush)}`);
  if(DB.cfg.lastSheetSummary) parts.push(DB.cfg.lastSheetSummary);
  if(!parts.length) return 'Belum pernah sinkron.';
  return parts.join(' · ');
}
function captureSheetSyncConfigFromForm(){
  if(!$('#gsWriteUrl')) return false;
  DB.cfg.sheetWriteUrl = gitTrim($('#gsWriteUrl').value) || DEFAULT_SHEET_WRITE_URL;
  DB.cfg.sheetWriteToken = gitTrim($('#gsWriteToken').value);
  DB.cfg.sheetWriteAutoSync = !!($('#gsWriteAuto') && $('#gsWriteAuto').checked);
  return true;
}
async function saveSheetSyncConfig(){
  captureSheetSyncConfigFromForm();
  DB.cfg = cfgDefaults(DB.cfg);
  await save('CFG',{skipRemote:true});
  toast('Konfigurasi Google Sheets live sync disimpan');
  if(VIEW==='guide') render();
}
function serializeSheetSyncDb(reason){
  const payload = {
    schema: SHEET_SYNC_SCHEMA,
    version: SHEET_SYNC_VERSION,
    app: 'SITRAS',
    reason: reason || 'manual',
    updatedAt: new Date().toISOString(),
    sharedConfig: gitSharedConfig(),
    samples: DB.samples,
    tests: DB.tests,
    movements: DB.movements,
  };
  const token = sheetWriteToken();
  if(token) payload.token = token;
  return payload;
}
function reportSheetError(message, manual){
  const text = String(message||'Sinkron Google Sheets gagal');
  DB.cfg.lastSheetError = text;
  if(manual){
    toast(text,'err');
  }else{
    const now = Date.now();
    if(SheetSync.lastError!==text || (now-SheetSync.lastErrorAt)>15000){
      SheetSync.lastError = text;
      SheetSync.lastErrorAt = now;
      toast(text,'err');
    }
  }
  if(VIEW==='guide') render();
}
function scheduleSheetPush(reason){
  if(!hasSheetWriteTarget() || DB.cfg.sheetWriteAutoSync===false) return;
  SheetSync.pending = true;
  if(SheetSync.busy) return;
  clearTimeout(SheetSync.timer);
  SheetSync.timer = setTimeout(()=>{
    SheetSync.timer = null;
    pushToGoogleSheets({manual:false, reason:reason||'autosave'});
  }, GSHEET_SYNC_DELAY_MS);
}
async function pushToGoogleSheets({manual=true, reason='manual'}={}){
  if(captureSheetSyncConfigFromForm()) await save('CFG',{skipRemote:true});
  if(!hasSheetWriteTarget()){
    if(manual) toast('URL Web App Google Sheets belum diisi','err');
    return false;
  }
  if(SheetSync.busy){
    SheetSync.pending = true;
    return false;
  }
  SheetSync.busy = true;
  SheetSync.pending = false;
  clearTimeout(SheetSync.timer);
  SheetSync.timer = null;
  try{
    const res = await fetch(sheetWriteUrl(), {
      method:'POST',
      headers:{
        'Accept':'application/json, text/plain, */*',
        'Content-Type':'text/plain;charset=utf-8',
      },
      body:JSON.stringify(serializeSheetSyncDb(reason)),
    });
    const txt = await res.text();
    let out = null;
    try{ out = txt ? JSON.parse(txt) : null; }catch(e){ out = null; }
    if(!res.ok){
      throw new Error(`Gagal mengirim data ke Google Sheets (HTTP ${res.status})${txt ? ': '+txt.slice(0,160) : ''}`);
    }
    if(out && out.ok===false){
      throw new Error(out.message || 'Apps Script menolak sinkron');
    }
    DB.cfg.lastSheetPush = new Date().toISOString();
    DB.cfg.lastSheetSummary = out && out.summary ? String(out.summary) : `${DB.samples.length} sampel · ${DB.tests.length} uji · ${DB.movements.length} log`;
    delete DB.cfg.lastSheetError;
    await save('CFG',{skipRemote:true});
    if(manual) toast(out && out.message ? out.message : 'Data berhasil dikirim ke Google Sheets');
    if(VIEW==='guide') render();
    return true;
  }catch(e){
    reportSheetError(e.message||e, manual);
    return false;
  }finally{
    SheetSync.busy = false;
    if(SheetSync.pending){
      SheetSync.pending = false;
      scheduleSheetPush('queued');
    }
  }
}

function _csvParse(text){
  text=String(text).replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  const rows=[]; let row=[],f='',i=0,q=false;
  while(i<text.length){const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){f+='"';i++;} else q=false; } else f+=c; }
    else { if(c==='"')q=true; else if(c===','){row.push(f);f='';} else if(c==='\n'){row.push(f);rows.push(row);row=[];f='';} else f+=c; }
    i++;}
  if(f!==''||row.length){row.push(f);rows.push(row);}
  return rows;
}
function _csvObjects(text){
  const rows=_csvParse(text).filter(r=>r.some(c=>String(c).trim()!==''));
  if(!rows.length) return [];
  const head=rows[0].map(h=>String(h).trim());
  return rows.slice(1).map(r=>{const o={};head.forEach((h,i)=>o[h]=String(r[i]==null?'':r[i]).trim());return o;});
}
function _pick(o,names){
  const keys=Object.keys(o);
  for(const n of names){const k=keys.find(k=>k.trim().toLowerCase()===n);if(k!==undefined)return o[k];}
  for(const n of names){const k=keys.find(k=>k.trim().toLowerCase().includes(n));if(k)return o[k];}
  return '';
}
function _mapSample(o){return {
  id:_pick(o,['kode sampel','kode']).trim(), alias:_pick(o,['alias / kode lokal','alias','kode lokal']),
  material:_pick(o,['material']), type:_pick(o,['tipe']), origin:_pick(o,['asal']),
  regDate:_pick(o,['tgl registrasi','tanggal registrasi','tgl reg']), source:_pick(o,['sumber / asal lokasi','sumber','asal lokasi']),
  parent:_pick(o,['induk (kode)','induk']), massInitial:num(_pick(o,['massa awal'])), massCurrent:num(_pick(o,['massa saat ini','massa kini'])),
  unit:_pick(o,['satuan'])||'g', moisture:_pick(o,['kadar air (%)','kadar air','kadar air %']),
  cond:_pick(o,['kondisi sampel','kondisi terima']), custodian:_pick(o,['custodian']), run:_pick(o,['run']),
  loc:_pick(o,['lokasi simpan','lokasi']), storecond:_pick(o,['kondisi simpan']), status:_pick(o,['status'])||'Terdaftar',
  notes:_pick(o,['catatan','keterangan']), createdAt:new Date().toISOString() };}
function _mapTest(o){return {
  id:uid('tst'), sampleCode:_pick(o,['kode sampel','sampel','kode']), category:_pick(o,['kategori uji','kategori','jenis uji']),
  params:_pick(o,['suhu/laju/waktu tahan','parameter','params']), method:_pick(o,['metode']), lab:_pick(o,['lab penguji','lab']),
  analyst:_pick(o,['analis']), status:_pick(o,['status'])||'Direncanakan', dateStart:_pick(o,['tgl mulai','tanggal mulai']),
  dateEnd:_pick(o,['tgl selesai','tanggal selesai']), massUsed:num(_pick(o,['massa dipakai (g)','massa dipakai','massa terpakai'])),
  certNo:_pick(o,['no. laporan/sertifikat','no. laporan','no laporan','sertifikat','no. sertifikat']),
  result:_pick(o,['hasil ringkas','hasil']), fileRef:_pick(o,['berkas / link','berkas','file']) };}
function _mapMove(o){return {
  id:uid('mov'), datetime:_pick(o,['tanggal-waktu','tanggal','waktu']), sampleCode:_pick(o,['kode sampel','sampel','kode']),
  action:_pick(o,['aksi']), fromLocation:_pick(o,['dari lokasi','dari']), toLocation:_pick(o,['ke lokasi','ke']),
  person:_pick(o,['oleh']), note:_pick(o,['keterangan','catatan']) };}
async function _fetchCSV(url){
  const u=url+(url.indexOf('?')>=0?'&':'?')+'_='+Date.now();
  const r=await fetch(u,{cache:'no-store'}); if(!r.ok) throw new Error('HTTP '+r.status);
  return _csvObjects(await r.text());
}
async function _updateFromSheets(){
  const bi=gitTrim(DB.cfg.sheetBI);
  const uji=gitTrim(DB.cfg.sheetUJI);
  const log=gitTrim(DB.cfg.sheetLOG);
  if(!bi && !uji && !log){ toast('Isi minimal satu URL CSV yang ingin ditarik','err'); return; }
  if(location.protocol==='file:'){ toast('Tombol Update butuh aplikasi dibuka via http (host/server). Untuk berkas lokal, pakai "Impor berkas CSV".','err'); return; }
  toast('Mengambil data dari Google Sheets…');
  try{
    const next = {samples:[], tests:[], movements:[]};
    const notes = [];
    if(bi){
      const s=await _fetchCSV(bi);
      next.samples=s.map(_mapSample).filter(x=>x.id);
    }
    if(uji){
      try{
        const t=await _fetchCSV(uji);
        next.tests=t.map(_mapTest).filter(x=>x.sampleCode);
      }catch(e){
        next.tests=[];
        notes.push('CSV pengujian gagal dibaca, data uji lokal dikosongkan');
      }
    }
    if(log){
      try{
        const l=await _fetchCSV(log);
        next.movements=l.map(_mapMove).filter(x=>x.sampleCode);
      }catch(e){
        next.movements=[];
        notes.push('CSV log gagal dibaca, data log lokal dikosongkan');
      }
    }
    if(bi){
      const sampleIds = new Set(next.samples.map(s=>s.id));
      next.tests = next.tests.filter(t=>sampleIds.has(t.sampleCode));
      next.movements = next.movements.filter(m=>sampleIds.has(m.sampleCode));
    }
    DB.samples=next.samples;
    DB.tests=next.tests;
    DB.movements=next.movements;
    await save('S'); await save('T'); await save('M');
    DB.cfg.lastSync=new Date().toISOString(); await save('CFG'); render();
    let msg = `Tersinkron: ${DB.samples.length} sampel`+(uji?`, ${DB.tests.length} uji`:'')+(log?`, ${DB.movements.length} pergerakan`:'');
    if(notes.length) msg += ` · ${notes.join(' · ')}`;
    toast(msg);
  }catch(e){ toast('Gagal memuat: '+(e.message||e)+'. Cek publikasi CSV / koneksi.','err'); }
}
function _importFile(kind,el){
  const f=el.files&&el.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=async()=>{ try{
    const rows=_csvObjects(String(rd.result));
    if(kind==='BI'){ DB.samples=rows.map(_mapSample).filter(x=>x.id); await save('S'); toast(DB.samples.length+' sampel diimpor'); }
    else if(kind==='UJI'){ DB.tests=rows.map(_mapTest).filter(x=>x.sampleCode); await save('T'); toast(DB.tests.length+' pengujian diimpor'); }
    else if(kind==='LOG'){ DB.movements=rows.map(_mapMove).filter(x=>x.sampleCode); await save('M'); toast(DB.movements.length+' pergerakan diimpor'); }
    DB.cfg.lastSync=new Date().toISOString(); await save('CFG'); render();
  }catch(e){ toast('Gagal impor: '+(e.message||e),'err'); } };
  rd.readAsText(f); el.value='';
}

}
