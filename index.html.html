/* ---------- parameter (mendukung ?kode=, #kode, /s/kode, dan ?demo=1) ---------- */
function params(){
  const f=window.__FORCE||{};
  const u=new URL(location.href);
  const demo = f.demo || u.searchParams.get('demo')==='1';
  let code = f.code || u.searchParams.get('kode') || u.searchParams.get('s') || '';
  if(!code && location.hash.length>1) code=decodeURIComponent(location.hash.slice(1));
  if(!code){ const m=location.pathname.match(/\/s\/([^\/?#]+)/); if(m) code=decodeURIComponent(m[1]); }
  return {demo, code:(code||'').trim()};
}
function linkFor(code){
  const u=new URL(location.href); u.hash=''; u.searchParams.delete('s');
  u.searchParams.set('kode',code); return u.pathname+u.search;
}

/* ---------- CSV parser (tangani tanda kutip, koma, newline dalam sel) ---------- */
function parseCSV(text){
  text=String(text).replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  const rows=[]; let row=[],field='',i=0,q=false;
  while(i<text.length){
    const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){field+='"';i++;} else q=false; } else field+=c; }
    else { if(c==='"') q=true; else if(c===','){row.push(field);field='';}
           else if(c==='\n'){row.push(field);rows.push(row);row=[];field='';} else field+=c; }
    i++;
  }
  if(field!==''||row.length){row.push(field);rows.push(row);}
  return rows;
}
function csvObjects(text){
  const rows=parseCSV(text).filter(r=>r.some(c=>String(c).trim()!==''));
  if(!rows.length) return [];
  const head=rows[0].map(h=>String(h).trim());
  return rows.slice(1).map(r=>{const o={};head.forEach((h,i)=>o[h]=String(r[i]==null?'':r[i]).trim());return o;});
}
function pick(o,names){
  const keys=Object.keys(o);
  for(const n of names){const k=keys.find(k=>k.trim().toLowerCase()===n);if(k!==undefined)return o[k];}
  for(const n of names){const k=keys.find(k=>k.trim().toLowerCase().includes(n));if(k)return o[k];}
  return '';
}
async function fetchCSV(url){
  const u=url+(url.indexOf('?')>=0?'&':'?')+'_='+Date.now();
  const r=await fetch(u,{cache:'no-store'});
  if(!r.ok) throw new Error('HTTP '+r.status);
  return csvObjects(await r.text());
}

/* ---------- field mappers ---------- */
const F={

  induk:['induk (kode)','induk','kode induk'], mAwal:['massa awal'], mKini:['massa saat ini','massa kini'],
  satuan:['satuan'], kadar:['kadar air (%)','kadar air'], kondS:['kondisi sampel'], cust:['custodian'],
  lokasi:['lokasi simpan','lokasi'], kondSimpan:['kondisi simpan'], status:['status'], catatan:['catatan','keterangan'],
};
const FT={kode:['kode sampel','kode'],kategori:['kategori uji','kategori'],metode:['metode'],lab:['lab penguji','lab'],
  analis:['analis'],mulai:['tgl mulai'],selesai:['tgl selesai'],cert:['no. laporan/sertifikat','no. laporan','no laporan','sertifikat'],
  status:['status'],hasil:['hasil ringkas','hasil'],berkas:['berkas / link','berkas','file']};
const FL={waktu:['tanggal-waktu','tanggal','waktu'],kode:['kode sampel','kode'],aksi:['aksi'],
  dari:['dari lokasi','dari'],ke:['ke lokasi','ke'],oleh:['oleh'],ket:['keterangan']};

function pillFor(status,map){const m=map[status]||{c:'#7c8175',b:'#ece8df'};
  return status?`<span class="pill" style="color:${m.c};background:${m.b}"><span class="dot" style="background:${m.c}"></span>${esc(status)}</span>`:'';}
function kv(k,v){if(v==null||String(v).trim()===''||v==='—')return '';return `<div class="kv"><div class="k">${esc(k)}</div><div class="v">${v}</div></div>`;}

/* ---------- RENDER: detail ---------- */
function renderDetail(code){
  const row=DATA.induk.find(r=>pick(r,F.kode).trim().toUpperCase()===code.toUpperCase());
  if(!row) return renderNotFound(code);
  const matc=pick(row,F.material), tipec=pick(row,F.tipe);
  const matTxt=matc?(MAT[matc]?matc+' — '+MAT[matc]:matc):'';
  const tipeTxt=tipec?(TIPE[tipec]?tipec+' — '+TIPE[tipec]:tipec):'';
  const induk=pick(row,F.induk);
  const mAwal=pick(row,F.mAwal),mKini=pick(row,F.mKini),sat=pick(row,F.satuan);
  const massa=(mAwal||mKini)?`${esc(mAwal||'?')} → <b>${esc(mKini||'?')}</b> ${esc(sat||'')}`:'';
  const kadar=pick(row,F.kadar);
  // turunan (anak)
  const children=DATA.induk.filter(r=>pick(r,F.induk).trim().toUpperCase()===code.toUpperCase());
  // pengujian & log terkait
  const tests=DATA.uji.filter(r=>pick(r,FT.kode).trim().toUpperCase()===code.toUpperCase());
  const moves=DATA.log.filter(r=>pick(r,FL.kode).trim().toUpperCase()===code.toUpperCase());

  let h=`<div class="mb"><a href="${esc(linkFor(''))}">← Daftar sampel</a></div>`;
  h+=`<div class="card mb"><div class="card-b">
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <span class="codebig">${esc(pick(row,F.kode))}</span>${pillFor(pick(row,F.status),STATUS)}
    </div>
    ${pick(row,F.alias)?`<div class="muted" style="margin-top:4px">Alias: <b>${esc(pick(row,F.alias))}</b></div>`:''}
    <div class="grid mt">
      ${kv('Material',esc(matTxt))}
      ${kv('Tipe',esc(tipeTxt))}
      ${kv('Asal',esc(pick(row,F.asal)))}
      ${kv('Tanggal registrasi',esc(pick(row,F.regdate)))}
      ${kv('Sumber / asal lokasi',esc(pick(row,F.sumber)))}
      ${kv('Induk',induk?`<a href="${esc(linkFor(induk))}" class="mono">${esc(induk)}</a>`:'')}
      ${kv('Massa (awal → kini)',massa)}
      ${kv('Kadar air',kadar?esc(kadar)+'%':'')}
      ${kv('Kondisi sampel',esc(pick(row,F.kondS)))}
      ${kv('Custodian',esc(pick(row,F.cust)))}
      ${kv('Lokasi simpan',esc(pick(row,F.lokasi)))}
      ${kv('Kondisi simpan',esc(pick(row,F.kondSimpan)))}
    </div>
    ${pick(row,F.catatan)?`<div class="kv"><div class="k">Catatan</div><div class="v">${esc(pick(row,F.catatan))}</div></div>`:''}
    ${children.length?`<div class="kv"><div class="k">Turunan (${children.length})</div><div class="v">`+children.map(c=>`<a href="${esc(linkFor(pick(c,F.kode)))}" class="tag">${esc(pick(c,F.kode))}</a>`).join(' ')+`</div></div>`:''}
  </div></div>`;

  if(DATA.uji.length || tests.length){
    h+=`<div class="card mb"><div class="card-h"><h3>Pengujian</h3><span class="micro">${tests.length} entri</span></div>`;
    if(tests.length){
      h+=`<div style="overflow-x:auto"><table class="tbl"><thead><tr><th>Kategori</th><th>Lab</th><th>No. Laporan</th><th>Status</th><th>Hasil ringkas</th></tr></thead><tbody>`;
      tests.forEach(t=>{h+=`<tr><td><b>${esc(pick(t,FT.kategori))}</b><div class="muted small">${esc(pick(t,FT.metode))}</div></td><td>${esc(pick(t,FT.lab))}</td><td class="mono">${esc(pick(t,FT.cert)||'—')}</td><td>${pillFor(pick(t,FT.status),TSTATUS)}</td><td>${esc(pick(t,FT.hasil))}</td></tr>`;});
      h+=`</tbody></table></div>`;
    } else h+=`<div class="card-b muted small">Belum ada entri pengujian untuk kode ini.</div>`;
    h+=`</div>`;
  }
  if(DATA.log.length || moves.length){
    if(moves.length){
      h+=`<div class="card mb"><div class="card-h"><h3>Riwayat penyimpanan</h3><span class="micro">${moves.length} catatan</span></div>`;
      h+=`<div style="overflow-x:auto"><table class="tbl"><thead><tr><th>Waktu</th><th>Aksi</th><th>Dari</th><th>Ke</th><th>Oleh</th><th>Keterangan</th></tr></thead><tbody>`;
      moves.forEach(m=>{h+=`<tr><td class="mono small">${esc(pick(m,FL.waktu))}</td><td>${esc(pick(m,FL.aksi))}</td><td>${esc(pick(m,FL.dari)||'—')}</td><td>${esc(pick(m,FL.ke)||'—')}</td><td>${esc(pick(m,FL.oleh))}</td><td>${esc(pick(m,FL.ket))}</td></tr>`;});
      h+=`</tbody></table></div></div>`;
    }
  }
  app.innerHTML=h;
}

/* ---------- RENDER: index/daftar + cari ---------- */
function renderIndex(){
  let h=`<div class="card mb"><div class="card-b">
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <input class="input" id="q" placeholder="Cari kode / alias / material…" style="flex:1;min-width:200px" oninput="filterList()">
    </div>
    <div class="muted small mt">${DATA.induk.length} sampel terdaftar. Pindai QR atau klik sampel untuk melihat detail.</div>
  </div></div>
  <div class="card"><div id="list"></div></div>`;
  app.innerHTML=h;
  window.__rows=DATA.induk.slice();
  drawList(window.__rows);
}
function drawList(rows){
  const box=$('#list');
  if(!rows.length){box.innerHTML='<div class="card-b muted small">Tidak ada yang cocok.</div>';return;}
  box.innerHTML=rows.map(r=>{
    const code=pick(r,F.kode),mat=pick(r,F.material);
    return `<div class="list-row" onclick="location.href='${esc(linkFor(code))}'">
      <span class="lc">${esc(code)}</span>
      <span class="la">${esc(pick(r,F.alias)||'')}${mat?` · ${esc(MAT[mat]?MAT[mat]:mat)}`:''}</span>
      ${pillFor(pick(r,F.status),STATUS)}
    </div>`;
  }).join('');
}
function filterList(){
  const q=($('#q').value||'').toLowerCase().trim();
  const rows=window.__rows.filter(r=>!q || [pick(r,F.kode),pick(r,F.alias),pick(r,F.material),pick(r,F.asal),pick(r,F.status)].join(' ').toLowerCase().includes(q));
  drawList(rows);
}

/* ---------- RENDER: not found ---------- */
function renderNotFound(code){
  app.innerHTML=`<div class="card"><div class="card-b">
    <div class="warn"><b>Kode tidak ditemukan:</b> <span class="mono">${esc(code)}</span><br>
    Sampel ini belum ada di basis data, atau penulisannya berbeda.</div>
    <div class="mt"><input class="input" id="q2" placeholder="Coba kode lain…" onkeydown="if(event.key==='Enter')location.href='${esc(linkFor(''))}'.replace(/kode=$/,'kode='+encodeURIComponent(this.value.trim()))"></div>
    <div class="mt"><a class="btn" href="${esc(linkFor(''))}">← Lihat daftar sampel</a></div>
  </div></div>`;
}

/* ---------- RENDER: belum dikonfigurasi (panduan) ---------- */
function renderSetup(){
  app.innerHTML=`<div class="card"><div class="card-h"><h3>Belum terhubung ke Google Sheets</h3></div><div class="card-b">
    <div class="note">Halaman ini siap menampilkan data sampel, tetapi sumber datanya belum diisi. Hubungkan ke Google Sheets dengan langkah berikut, lalu unggah ulang berkas ini ke hosting Anda.</div>
    <ol class="steps">
      <li>Unggah berkas <b>Logbook-Ketertelusuran-Sampel.xlsx</b> ke Google Drive, lalu buka sebagai <b>Google Sheets</b>.</li>
      <li>Menu <b>File → Share → Publish to web</b>.</li>
      <li>Pilih sheet <b>Buku Induk</b>, format <b>Comma-separated values (.csv)</b>, klik <b>Publish</b>, lalu salin tautannya.</li>
      <li>Buka berkas ini (<span class="tag">katalog-sampel.html</span>) dengan editor teks, tempel tautan tadi pada <span class="tag">bukuIndukCSV</span> di bagian <b>CONFIG</b>. (Opsional: ulangi untuk sheet <b>Pengujian</b> dan <b>Log Penyimpanan</b>.)</li>
      <li>Host berkas ini (mis. GitHub Pages / Cloudflare Pages). Jadikan namanya <span class="tag">index.html</span> bila ingin URL pendek.</li>
      <li>Di aplikasi SITRAS → tab <b>Panduan &amp; ISO</b> → <b>Pengaturan Tautan QR</b>, isi base-URL: <span class="tag">https://alamat-anda/?kode={kode}</span></li>
    </ol>
    <div class="warn mt"><b>Catatan privasi:</b> sheet yang dipublikasikan dapat dibaca publik (tanpa daftar/login). Cocok untuk katalog sampel; jangan taruh data sensitif di situ. Pengisian/penyuntingan tetap dilakukan di Google Sheets atau aplikasi SITRAS.</div>
    <div class="center mt"><a class="btn moss" href="?demo=1">Lihat contoh tampilan (data tengkawang)</a></div>
  </div></div>`;
}

/* ---------- RENDER: error ---------- */
function renderError(e){
  app.innerHTML=`<div class="card"><div class="card-b">
    <div class="err"><b>Gagal memuat data dari Google Sheets.</b><br>${esc(String(e&&e.message||e))}</div>
    <ul class="steps">
      <li>Pastikan sheet sudah <b>Publish to web</b> (bukan sekadar dibagikan).</li>
      <li>Pastikan tautan pada <span class="tag">CONFIG</span> adalah format <b>CSV</b>.</li>
      <li>Coba buka tautan CSV langsung di browser untuk memastikan dapat diakses.</li>
    </ul>
    <div class="mt"><a class="btn" href="?demo=1">Lihat contoh tampilan</a></div>
  </div></div>`;
}

/* ---------- init ---------- */
async function init(){
  $('#labName').textContent=CONFIG.labName||'Katalog Sampel';
  $('#labSub').textContent=CONFIG.labSub||'';
  $('#ft').innerHTML='';
  const {demo,code}=params();
  try{
    if(demo){ demoData(); }
    else if(CONFIG.bukuIndukCSV){
      const tasks=[fetchCSV(CONFIG.bukuIndukCSV).then(d=>DATA.induk=d)];
      if(CONFIG.pengujianCSV) tasks.push(fetchCSV(CONFIG.pengujianCSV).then(d=>DATA.uji=d).catch(()=>{}));
      if(CONFIG.logCSV)       tasks.push(fetchCSV(CONFIG.logCSV).then(d=>DATA.log=d).catch(()=>{}));
      await Promise.all(tasks);
    } else { renderSetup(); return; }
  }catch(e){ renderError(e); return; }

  if(code) renderDetail(code); else renderIndex();
  const when=new Date().toLocaleString('id-ID');
  $('#ft').innerHTML=(demo?'Mode contoh (data tengkawang) · ':'Sumber data: Google Sheets · ')+'diperbarui '+esc(when)+' · '+esc(CONFIG.labSub||'');
}
document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
